services:
  - type: web
    name: vector-chat
    runtime: docker
    plan: starter
    region: oregon
    healthCheckPath: /api/health
    disk:
      name: vector-chat-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - { key: NODE_ENV, value: production }
      - { key: DATABASE_URL, value: file:/app/data/vector.db }
      - { key: JWT_SECRET, generateValue: true }
      - { key: VITE_AUTH_MODE, value: cookie }
      - { key: LIVEKIT_API_KEY, sync: false }
      - { key: LIVEKIT_API_SECRET, sync: false }
      - { key: LIVEKIT_WS_URL, sync: false }
      - { key: VAPID_PUBLIC_KEY, sync: false }
      - { key: VAPID_PRIVATE_KEY, sync: false }
      - { key: VAPID_SUBJECT, value: mailto:chat@bulldogops.com }
      - { key: VITE_VAPID_PUBLIC_KEY, sync: false }
      # File storage backend: "disk" (default, writes to /app/data/uploads) or "s3"
      - { key: STORAGE_BACKEND, value: disk }
      # S3-compatible storage (required for STORAGE_BACKEND=s3 and for LiveKit recordings)
      - { key: S3_ENDPOINT, sync: false }       # e.g. https://s3.us-east-1.amazonaws.com or https://<account>.r2.cloudflarestorage.com
      - { key: S3_REGION, value: us-east-1 }
      - { key: S3_BUCKET, sync: false }
      - { key: S3_ACCESS_KEY, sync: false }
      - { key: S3_SECRET_KEY, sync: false }
      - { key: S3_PUBLIC_URL_BASE, sync: false } # optional: public CDN base, used to build attachment URLs
      # LiveKit webhook secret (optional — for verifying egress callbacks)
      - { key: LIVEKIT_WEBHOOK_KEY, sync: false }
      # Suite shared secret for service-to-service calls to bulldog-auth.
      # Required for the SMS consent gate (server/auth-consent.ts): when unset,
      # the gate fails closed and ALL outbound SMS is skipped. Set the real
      # value in the Render dashboard (srv-d8b5te77f7vs73bp86p0).
      - { key: SUITE_INTERNAL_SECRET, sync: false }
      # Override the bulldog-auth base URL (defaults to https://auth.bulldogops.com).
      - { key: AUTH_BASE_URL, sync: false }
      # SendGrid (email invites) — required for scheduled-calls.ts email fan-out.
      # If unset, isEmailConfigured() returns false and all outbound email is
      # silently skipped. Mirror the SendGrid key used by bulldog-auth.
      - { key: SENDGRID_API_KEY, sync: false }
      - { key: SENDGRID_FROM_EMAIL, value: noreply@bulldogops.com }
      - { key: SENDGRID_FROM_NAME, value: Bulldog Chat }
